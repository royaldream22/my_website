<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GMotionStudio — Налаштування маркетплейсів</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #2563EB;
      --blue-light: #3B82F6;
      --blue-pale: #EFF6FF;
      --blue-glow: rgba(37,99,235,0.18);
      --blue-glow2: rgba(59,130,246,0.10);
      --bg: #F8FAFF;
      --white: #ffffff;
      --text: #0F1729;
      --text-muted: #64748B;
      --text-light: #94A3B8;
      --border: rgba(37,99,235,0.13);
      --shadow: 0 4px 32px rgba(37,99,235,0.10);
      --shadow-lg: 0 16px 64px rgba(37,99,235,0.16);
      --radius: 18px;
      --radius-sm: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      cursor: none;
    }

    /* ---- CUSTOM CURSOR ---- */
    #cursor-outer {
      position: fixed; top: 0; left: 0;
      width: 36px; height: 36px;
      border: 1.5px solid var(--blue);
      border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      transition: width .25s, height .25s, background .2s, border-color .2s, box-shadow .2s;
      will-change: transform;
    }
    #cursor-dot {
      position: fixed; top: 0; left: 0;
      width: 6px; height: 6px;
      background: var(--blue);
      border-radius: 50%;
      pointer-events: none; z-index: 10000;
      transform: translate(-50%,-50%);
      transition: width .1s, height .1s;
      will-change: transform;
    }
    body.cursor-hover #cursor-outer {
      width: 56px; height: 56px;
      background: rgba(37,99,235,0.07);
      box-shadow: 0 0 20px rgba(37,99,235,0.22);
      border-color: var(--blue-light);
    }

    /* ---- CANVAS BACKGROUND ---- */
    #bg-canvas {
      position: fixed; 
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -1;
      pointer-events: none;
      background: var(--bg);
    }

    /* ---- FLOATING 3D ELEMENTS (Геометрические фигуры) ---- */
    .float-el {
      position: absolute;
      pointer-events: none;
      z-index: 1;
      opacity: 0.38;
      transition: transform 0.12s ease-out;
    }
    .float-el svg { display: block; }

    /* ---- MAIN LAYOUT ---- */
    .page { position: relative; z-index: 2; }

    /* ---- NAV ---- */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 64px;
      background: rgba(248,250,255,0.82);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      transition: box-shadow .3s;
    }
    nav.scrolled { box-shadow: 0 4px 24px rgba(37,99,235,0.08); }
    .nav-logo {
      font-size: 17px; font-weight: 800;
      letter-spacing: -0.5px; color: var(--text);
      display: flex; align-items: center; gap: 8px;
      cursor: none;
    }
    .nav-logo span { color: var(--blue); }
    .nav-logo-dot {
      width: 8px; height: 8px; background: var(--blue);
      border-radius: 50%; display: inline-block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.4)} }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      font-size: 14px; font-weight: 500; color: var(--text-muted);
      text-decoration: none; cursor: none;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--blue); }
    .nav-cta {
      background: var(--blue); color: white;
      border: none; border-radius: 10px;
      padding: 10px 22px; font-size: 14px; font-weight: 600;
      cursor: none; font-family: 'Manrope', sans-serif;
      transition: transform .2s, box-shadow .2s, background .2s;
    }

    /* ---- HERO SECTION ---- */
    #hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 140px 0 100px;
      position: relative;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 48px; }
    #hero .container { max-width: 1600px; }
